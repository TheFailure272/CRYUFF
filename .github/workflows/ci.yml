# ──────────────────────────────────────────────────────────────
# C.R.U.Y.F.F. — CI Pipeline (GitHub Actions)
# ──────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: lint + test ──────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m py_compile server/main.py

      - name: Type check (optional)
        run: |
          pip install pyright --quiet
          pyright server/ engine/ --pythonversion 3.12 || true
        continue-on-error: true

      - name: Test
        run: python -m pytest tests/ -v --tb=short

  # ── Frontend: build ──────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  # ── Docker: build (no push) ──────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build --target production -t cruyff-backend .

      - name: Build frontend image
        run: docker build --target production -t cruyff-frontend frontend/
